# Local override template for WebScraperToolkit runtime behavior.
# Copy to `settings.local.cfg` (or `settings.cfg`) for machine-specific tuning.
# Do not commit local credentials or private host values.

[runtime]
default_timeout_profile = research
safe_output_root = ./output
job_retention_seconds = 7200
max_job_records = 2000

[concurrency]
cli_workers_default = auto
cli_workers_max = 64
mcp_process_workers = 0
mcp_inflight_limit = 0
mcp_batch_workers = 0
crawler_default_workers = 0
crawler_max_workers = 160
cpu_reserve = 2

[server]
transport = streamable-http
host = 0.0.0.0
port = 8000
path = /mcp
require_api_key = true
api_key_env = WST_MCP_API_KEY
expose_server_banner = true

[timeout.fast]
soft_seconds = 20
hard_seconds = 45
extension_seconds = 10
allow_extension = true

[timeout.standard]
soft_seconds = 60
hard_seconds = 180
extension_seconds = 60
allow_extension = true

[timeout.research]
soft_seconds = 180
hard_seconds = 900
extension_seconds = 300
allow_extension = true

[timeout.long]
soft_seconds = 600
hard_seconds = 3600
extension_seconds = 900
allow_extension = true
